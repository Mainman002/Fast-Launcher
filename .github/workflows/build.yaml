name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger a build manually from the Actions tab

jobs:
  build:
    name: Build and Archive
    runs-on: macos-26 # Optimized for your 2026 build environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1' # Matches your local version exactly

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project Xcode_Project/FastLauncher.xcodeproj \
            -scheme FastLauncher \
            -archivePath ./build/FastLauncher.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export and Zip .app
        run: |
          mkdir -p ./export
          cp -R ./build/FastLauncher.xcarchive/Products/Applications/FastLauncher.app ./export/
          cd ./export
          zip -r ../FastLauncher-macOS.zip FastLauncher.app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastLauncher-v${{ github.run_number }}
          path: FastLauncher-macOS.zip