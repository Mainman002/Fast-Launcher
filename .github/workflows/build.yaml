name: Build and Release macOS App

on:
  push:
    tags:
      - "*.*.*" # Triggers only when you push a tag like 1.0.2
  workflow_dispatch: # Allows manual builds too

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Release
    runs-on: macos-26
    permissions:
      contents: write # Critical: Allows the action to create the release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project Xcode_Project/FastLauncher.xcodeproj \
            -scheme FastLauncher \
            -archivePath ./build/FastLauncher.xcarchive \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package .app
        run: |
          mkdir -p ./export
          cp -R ./build/FastLauncher.xcarchive/Products/Applications/FastLauncher.app ./export/
          cd ./export
          zip -r ../FastLauncher-macOS.zip FastLauncher.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: FastLauncher-macOS.zip
          generate_release_notes: true # Auto-generates the changelog from your commits